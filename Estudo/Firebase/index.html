<!DOCTYPE html>
<html lang="pt-BR">
    <header>
      <meta charset="UTF-8">
      <title>TodoList</title>
      <link rel="shortcut icon" href="img/todoListFavicon.png" type="image/x-icon">
      <link rel="stylesheet" href="css/styles.css">
    </header>

    <body>
        <!--LOGOTIPO-->
         <div id="app">
            <div class="center">
               <img src="img/aas.png" width="350px">
            </div>
            <!--Feedback de carregamento (loading) -->
            <div id="loading">
            <img src="img/loading.gif">
            </div>

            <!--conteudo de ususarios nn altenticados -->
            <div id="auth" class="center">
                <!-- Formulario de altenticação-->
                 <form id="authForm">
                    <h3 id="authFormTitle"> Acesse a sua conta para continuar</h3>

                    <label for="email">E-mail: </label>
                    <input type="email" placeholder="E-mail" id="email">

                    <label for="password">Senha: </label>
                    <input type="password" placeholder="Senha" id="password">

                    <button type="submit" id="submitAuthForm">Acessar</button>
                 </form>

                 <!--Redefinir senha  -->
                 <p id="passwordReset">
                    esqueceu a senha ?
                    <button  class="alternative" onclick="sendPasswordResetEmail()"> Redefinir minha senha</button>
                 </p>

                 <!--Alternar o formulario de altenticação para o acesso de contas ja existentes -->
                 <p id="registrar">
                    Não possui uma conta?
                    <button onclick="toggleToRegister()" class="alternative"> Cadastrar uma nova conta</button>
                 </p>

                  <p id="access" class="startHidden" >
                    Já possui uma conta?
                    <button onclick="toggleToAccess()" class="alternative"> Acesse a sua conta</button>
                 </p>
                 <!-- Outros provedores de autenticação -->
                 <p>
                  Ou acesse usando: <br>
                  <img src="img/google1.png" alt="Altenticação pelo google" onclick="signInWithGoogle()" width="32px">
                  <img src="img/github.png" alt="Altenticação pelo github" onclick="signInWithGithub()">
                  <img src="img/facebook.png" alt="Altenticação pelo facebook" onclick="signInWithFacebook()">
                 </p>
            </div>


       <!--conteudo de ususarios já altenticados -->
      <div id="userContent" class="startHidden">
             <hr>
             <div id="userIndo" class="center">
               <img id="userImg">
               <p id="userName"></p>
                 <p>Usuário:  <p id="userEmail"></p></p>
                 <p id="emailVerified"></p>  <!--email verificado -->
                 <div id="sendEmailVerificationDiv">
                  <button class="alternative" onclick="sendEmailVerification()">Verificar e-mail</button>
                 </div>
                 <button class="alternative" onclick="updateUserName()">Atualizar meu nome</button>
                 <button class="alternative" onclick="signOut()">Sair</button>
                 <button class="danger" onclick="deleteUserAccount()">Excluir da minha conta</button>
             </div>

              <hr>
               <!-- Lista de tarefas do hsuario-->
               <div id="todoList">
                  
               </div>
         

         <!-- FOrmulario de tarefas -->
              <div class="center">
                <form id="todoForm">
               <h3 id="todoFormTitle">Adicionar tarefa:</h3>
               <label for="name">Tarefa: </label>
               <input type="text" id="name" placeholder="Tarefa">
               <button type="submit" id="submitTodoForm">Adicionar tarefa</button>
            </form>
            </div>
         </div>
      </div>

          <script src="https://www.gstatic.com/firebasejs/7.8.1/firebase-app.js"></script>
          <script src="https://www.gstatic.com/firebasejs/7.8.1/firebase-auth.js"></script>
          <script src="https://www.gstatic.com/firebasejs/7.8.1/firebase-database.js"></script> 

        
     
         <!--JavaScript-->
          <script src="js/firebase.js"></script>
          <script src="js/utils.js"></script>
          <script src="js/auth.js"></script>
          <script src="js/todo.js"></script>
    </body>
</html>
